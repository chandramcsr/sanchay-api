# Local development only. Brings up Postgres + the API together so
# `docker compose up` is the entire "get started" story.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sanchay
      POSTGRES_PASSWORD: sanchay_dev_password
      POSTGRES_DB: sanchay
    ports:
      - "5432:5432"
    volumes:
      - sanchay_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanchay"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./app:/code/app
      - ./alembic:/code/alembic

volumes:
  sanchay_pg_data:
